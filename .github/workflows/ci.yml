name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        working-directory: services
        run: |
          python -m pip install --upgrade pip
          pip install '.[dev]'

      - name: Build deploy wheel
        run: uv build --wheel --no-build-logs --no-build-isolation --out-dir /tmp/magiclens-wheel services

      - name: Static import checks
        run: |
          python -m compileall -q services
          cd services
          python -c "import api.bootstrap, core.render_queue, core.database; print('Imports OK')"

      - name: Lint with ruff
        working-directory: services
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests with pytest
        working-directory: services
        run: pytest tests/ -v --tb=short

  frontend-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
