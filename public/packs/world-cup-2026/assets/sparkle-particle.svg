<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <circle cx="50" cy="50" r="3" fill="#fbbf24" opacity="0.9">
    <animate attributeName="r" values="3;5;3" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Cross sparkle -->
  <line x1="50" y1="35" x2="50" y2="65" stroke="#fbbf24" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="35" y1="50" x2="65" y2="50" stroke="#fbbf24" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="2s" repeatCount="indefinite"/>
  </line>
  <!-- Diagonal sparkles -->
  <line x1="38" y1="38" x2="62" y2="62" stroke="#FFD700" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="62" y1="38" x2="38" y2="62" stroke="#FFD700" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" values="0;0.4;0" dur="3s" repeatCount="indefinite"/>
  </line>
</svg>
