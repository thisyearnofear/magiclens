<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- Large confetti pieces -->
  <rect x="120" y="80" width="24" height="8" rx="2" fill="#FFD700" transform="rotate(25 132 84)" opacity="0.9">
    <animate attributeName="y" values="80;380;80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0;0.9" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="250" y="40" width="20" height="7" rx="2" fill="#FF4500" transform="rotate(-15 260 43)" opacity="0.85">
    <animate attributeName="y" values="40;360;40" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="rotate" values="-15;45;-15" dur="3.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="400" y="60" width="22" height="6" rx="2" fill="#FF69B4" transform="rotate(40 411 63)" opacity="0.8">
    <animate attributeName="y" values="60;380;60" dur="2.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="180" y="120" width="18" height="6" rx="2" fill="#00FF88" transform="rotate(-30 189 123)" opacity="0.85">
    <animate attributeName="y" values="120;400;120" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="350" y="100" width="26" height="8" rx="2" fill="#00BFFF" transform="rotate(55 363 104)" opacity="0.9">
    <animate attributeName="y" values="100;390;100" dur="3.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Small confetti dots -->
  <circle cx="150" cy="150" r="5" fill="#FFD700" opacity="0.8">
    <animate attributeName="cy" values="150;370;150" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="150;120;150" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="50" r="4" fill="#FF4500" opacity="0.7">
    <animate attributeName="cy" values="50;350;50" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="300;280;300" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="480" cy="90" r="6" fill="#FF69B4" opacity="0.75">
    <animate attributeName="cy" values="90;390;90" dur="3.8s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="480;510;480" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="70" r="3" fill="#00FF88" opacity="0.7">
    <animate attributeName="cy" values="70;370;70" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="520" cy="60" r="4" fill="#00BFFF" opacity="0.65">
    <animate attributeName="cy" values="60;340;60" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  <!-- Star burst -->
  <text x="300" y="200" text-anchor="middle" font-size="60" opacity="0.4" fill="#FFD700">✦</text>
  <text x="300" y="200" text-anchor="middle" font-size="40" opacity="0.6" fill="#FFD700">✦</text>
  <!-- Trophy emoji burst -->
  <text x="200" y="180" font-size="28" opacity="0.5">🏆</text>
  <text x="400" y="190" font-size="24" opacity="0.4">🏆</text>
  <text x="300" y="160" font-size="20" opacity="0.3">⭐</text>
</svg>
