<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 320" width="220" height="320">
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
  </defs>
  <!-- Card body -->
  <rect x="10" y="10" width="200" height="300" rx="16" fill="url(#card-bg)" stroke="#fbbf24" stroke-width="2" filter="url(#card-shadow)"/>
  <!-- Top accent bar -->
  <rect x="10" y="10" width="200" height="6" rx="3" fill="#fbbf24"/>
  <!-- Yellow card icon -->
  <rect x="75" y="40" width="70" height="100" rx="8" fill="#fbbf24" stroke="#eab308" stroke-width="2"/>
  <text x="110" y="68" text-anchor="middle" font-size="12" font-weight="800" fill="#1a1a2e" letter-spacing="1">WARNING</text>
  <text x="110" y="105" text-anchor="middle" font-size="36">🟨</text>
  <!-- Card text -->
  <text x="110" y="175" text-anchor="middle" font-size="18" font-weight="800" fill="#FFFFFF" letter-spacing="1">BOOKED</text>
  <!-- Player info -->
  <rect x="30" y="195" width="160" height="40" rx="8" fill="rgba(255,255,255,0.05)"/>
  <text x="110" y="220" text-anchor="middle" font-size="14" font-weight="600" fill="#fbbf24">#10 L. MESSI</text>
  <!-- Match info -->
  <text x="110" y="255" text-anchor="middle" font-size="11" fill="#64748b">ARG vs BRA • 67'</text>
  <!-- Bottom line -->
  <line x1="30" y1="275" x2="190" y2="275" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="110" y="293" text-anchor="middle" font-size="10" fill="#475569">Unsporting behavior</text>
</svg>
