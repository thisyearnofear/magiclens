<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <circle cx="100" cy="100" r="90" fill="none" stroke="#4ade80" stroke-width="3" opacity="0.3"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#22c55e" stroke-width="2.5" opacity="0.4"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="100" r="58" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.3"/>
  <!-- Inner flag circle -->
  <clipPath id="circle-clip">
    <circle cx="100" cy="100" r="48"/>
  </clipPath>
  <!-- Placeholder gradient flag -->
  <circle cx="100" cy="100" r="48" fill="url(#flag-grad)"/>
  <defs>
    <linearGradient id="flag-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="70%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="48" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.8"/>
  <!-- Glow ring -->
  <circle cx="100" cy="100" r="52" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.6">
    <animate attributeName="r" values="52;58;52" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Small orbiting dots -->
  <circle cx="100" cy="10" r="4" fill="#fbbf24" opacity="0.7">
    <animate attributeName="cy" values="10;190;10" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="100;100;100" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="190" cy="100" r="3" fill="#4ade80" opacity="0.5">
    <animate attributeName="cx" values="190;10;190" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="10" cy="100" r="3" fill="#3b82f6" opacity="0.5">
    <animate attributeName="cx" values="10;190;10" dur="7s" repeatCount="indefinite"/>
  </circle>
</svg>
